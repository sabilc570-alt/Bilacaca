<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Toko Baju Estetik</title>

<style>
body {
  font-family: 'Segoe UI';
  margin:0;
  background: linear-gradient(135deg,#a1c4fd,#c2e9fb);
}

header {
  background:#4facfe;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
}

.card {
  background:white;
  width:200px;
  margin:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
}

.card img {
  width:100%;
  border-radius:15px 15px 0 0;
}

button {
  background:#4facfe;
  color:white;
  border:none;
  padding:10px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
}

button:hover {
  background:#00c6ff;
}
</style>
</head>

<body>

<header>🛍️ Toko Baju Estetik</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>Kaos Casual</h4>
<p>Rp100.000</p>
<button onclick="tambah('Kaos Casual')">Tambah</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>Hoodie Biru</h4>
<p>Rp200.000</p>
<button onclick="tambah('Hoodie Biru')">Tambah</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>Jaket Trendy</h4>
<p>Rp250.000</p>
<button onclick="tambah('Jaket Trendy')">Tambah</button>
</div>

</div>

<center>
<a href="checkout.html">
<button>Lihat Keranjang & Checkout</button>
</a>
</center>

<script>
function tambah(nama){
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  cart.push(nama);
  localStorage.setItem('cart', JSON.stringify(cart));
  alert(nama + " ditambahkan ke keranjang!");
}
</script>

</body>
</html>
